<!-- 🔒 CORE MODULE: DATA ENGINE -->
<!-- PRODUCTION LOCK -->
<!-- Handles:
     - caching
     - fallback rendering
     - Firebase fetch
     - badge generation
-->
<!-- This is the HEART of the page -->
<!-- Any modification must be intentional and tested -->
<!-- ===================== -->
<script>
window.addEventListener("load", async () => {

const modes = ["click","charisma","mog","aura"];
const emoji = { click:"🟢", charisma:"🔥", mog:"💎", aura:"✨" };

let memoryCache = null;

/* SAFE RENDER ENGINE */
function render(data){
  if(!data) return;

  const cache = {};

  modes.forEach(mode=>{
    const sorted = Object.entries(data[mode] || {})
      .sort((a,b)=>b[1]-a[1])
      .slice(0,10);

    sorted.forEach(([name],i)=>{
      if(!cache[name]) cache[name] = {};
      cache[name][mode] = i+1;
    });
  });

  document.querySelectorAll(".badges").forEach(el=>{
    const name = el.dataset.name;
    const entry = cache[name];
    if(!entry) return;

    el.innerHTML = Object.entries(entry)
      .map(([mode,rank]) =>
        `<span class="badge" title="Top 10 ${mode} (Rank #${rank})">${emoji[mode]} #${rank}</span>`
      ).join("");
  });
}

/* LOCAL CACHE LOAD */
function loadLocal(){
  try{
    const saved = localStorage.getItem("mog_badges_cache");
    if(saved) return JSON.parse(saved);
  }catch{}
  return null;
}

/* LOCAL CACHE SAVE */
function saveLocal(data){
  try{
    localStorage.setItem("mog_badges_cache", JSON.stringify(data));
  }catch{}
}

/* RESILIENT FETCH SYSTEM */
async function fetchWithRetry(db, attempts=5){
  let delay = 500;

  for(let i=0;i<attempts;i++){
    try{
      const snap = await db.collection("stats").doc("global").get();
      return snap.data() || {};
    }catch(e){
      await new Promise(r=>setTimeout(r, delay));
      delay *= 2;
    }
  }
  return null;
}

try {

const app = firebase.initializeApp({
  apiKey:"AIzaSyA8Uo2ova4ink0OH4OxrheYNnQWUq86xIk",
  authDomain:"mogalytics-3c9e2.firebaseapp.com",
  projectId:"mogalytics-3c9e2"
});

const db = firebase.firestore();

/* CACHE FIRST STRATEGY */
const localData = loadLocal();
if(localData){
  memoryCache = localData;
  render(localData);
}

/* LIVE DATA FETCH */
const fresh = await fetchWithRetry(db);

if(fresh){
  memoryCache = fresh;
  saveLocal(fresh);
  render(fresh);
}

} catch(e) {
  console.log("Badge system safe fallback", e);
}

});
</script>
